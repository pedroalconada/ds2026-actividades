<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Catálogo</h1>
    <input type="text" id="filtroAutor" placeholder="Ingrese un autor">
    <button id="filtrar">Filtrar</button>
    <button id="mostrarDisponibles">Solo disponible</button>
    <button id="mostrarTodos">Ver todos</button><br><br>
    <div id="errorForm"></div>

    <div>
        <form>
            <label>Titulo:</label>
            <input id="titulo" type="text" required><br><br>

            <label>Autor:</label>
            <input id="autor" type="text" required><br><br>

            <label>Genero:</label>
            <input id="genero" type="text"><br><br>

            <label>Precio:</label>
            <input id="precio" type="number" required><br><br>

            <label>¿Esta disponible?</label>
            <input type="radio" name="disponible" value="true">
            <label>Si</label>
            <input type="radio" name="disponible" value="false">
            <label>No</label><br><br>

            <button id="agregar">Agregar</button>
        </form>
    </div>
    <ul id="listado"></ul>
    <p id="stats"></p>

    <script src="app.js"></script>
</body>
</html>

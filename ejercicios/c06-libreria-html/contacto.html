<div class="container my-4 bg-white p-5 rounded shadow-sm mb-5" style="max-width: 600px;">
  <h2 class="mb-4 text-center">Contactanos</h2>
  <form>
    <div class="mb-3">
      <label class="form-label">Nombre:</label><br>
      <input type="text" class="form-control" placeholder="Ingresa tu nombre" required><br>
    </div>

    <div class="mb-3">
      <label class="form-label">Email:</label><br>
      <input type="email" class="form-control" placeholder="Ingresa tu email"><br>
    </div>

    <div class="mb-3">
      <label for="asunto" class="form-label">Asunto:</label>   

      <select class="form-select" id="asunto" required>      
         <option value="" selected disabled>Seleccioná una opción...</option>
         <option value="Consulta">Consulta</option>
         <option value="Reclamo">Reclamo</option>
         <option value="Sugerencia">Sugerencia</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="mensaje" class="form-label">Mensaje:</label>
      <textarea id="mensaje" class="form-control" placeholder="Dejanos tu mensaje..." required></textarea><br>
    </div>

    <div class="mb-3 d-grid">
      <button type="submit" class="btn btn-primary">Enviar</button>
    </div>

  </form>
</div>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
